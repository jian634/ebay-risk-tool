<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>eBay Heavy Goods Risk Detection</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f6fa; color: #222; }

  header {
    background: #3665f3;
    color: white;
    padding: 20px 40px;
  }
  header h1 { font-size: 20px; }
  header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }

  .container { max-width: 860px; margin: 30px auto; padding: 0 20px; }

  .card {
    background: white;
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .card h2 { font-size: 15px; color: #3665f3; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }

  .form-row { display: flex; gap: 16px; margin-bottom: 14px; }
  .form-group { flex: 1; }
  .form-group label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: bold; }
  .form-group input, .form-group select {
    width: 100%; padding: 8px 10px; border: 1px solid #ddd;
    border-radius: 4px; font-size: 14px;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none; border-color: #3665f3;
  }

  .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
  .checkbox-group label { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; font-weight: normal; cursor: pointer; }
  .checkbox-group input[type=checkbox] { margin-top: 2px; width: 15px; height: 15px; }

  .btn {
    display: block; width: 100%; padding: 12px;
    background: #3665f3; color: white; border: none;
    border-radius: 6px; font-size: 16px; font-weight: bold;
    cursor: pointer; margin-top: 8px;
  }
  .btn:hover { background: #2851d0; }

  #result { display: none; }

  .result-header {
    display: flex; align-items: center; gap: 20px;
    padding: 20px; border-radius: 8px; margin-bottom: 16px;
  }
  .result-header.low    { background: #e6f4ea; border-left: 6px solid #34a853; }
  .result-header.medium { background: #fff8e1; border-left: 6px solid #fbbc04; }
  .result-header.high   { background: #fce8e6; border-left: 6px solid #ea4335; }
  .result-header.block  { background: #fce8e6; border-left: 6px solid #c62828; }

  .score-big { font-size: 52px; font-weight: bold; min-width: 80px; text-align: center; }
  .result-label { font-size: 18px; font-weight: bold; }
  .result-action { font-size: 13px; margin-top: 4px; color: #555; }

  .module-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .module-card {
    border: 1px solid #eee; border-radius: 6px; padding: 12px;
  }
  .module-card .mod-name { font-size: 12px; color: #888; }
  .module-card .mod-score { font-size: 24px; font-weight: bold; }
  .module-card .mod-reason { font-size: 12px; color: #555; margin-top: 4px; }
  .bar { height: 6px; background: #eee; border-radius: 3px; margin-top: 6px; }
  .bar-fill { height: 100%; border-radius: 3px; }

  .size-check { padding: 10px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-bottom: 16px; }
  .size-check.pass { background: #e6f4ea; color: #2e7d32; }
  .size-check.fail { background: #fce8e6; color: #c62828; }

  .tier-box {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .tier-item {
    flex: 1; min-width: 140px; padding: 12px; border-radius: 6px;
    border: 2px solid #eee; text-align: center; opacity: 0.4;
  }
  .tier-item.active { opacity: 1; border-color: #3665f3; background: #f0f4ff; }
  .tier-item.active.cliff { border-color: #e53238; background: #fff0f0; }
  .tier-item .tier-name { font-size: 12px; color: #555; }
  .tier-item .tier-range { font-size: 11px; color: #999; margin-bottom: 4px; }
  .tier-item .tier-pct { font-size: 22px; font-weight: bold; color: #3665f3; }
  .tier-item.active.cliff .tier-pct { color: #e53238; }
  .tier-item .tier-reward { font-size: 11px; color: #888; margin-top: 2px; }
  .cliff-alert {
    background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px;
    padding: 10px 14px; font-size: 13px; color: #856404; margin-bottom: 12px;
  }
</style>
</head>

// Module 2 词库 —— 宽泛匹配，不绑定特定拼写
// 高重量正向词（减分）：重材质
const TITLE_HEAVY_MATERIAL = [
  'solid wood','hardwood','oak','walnut','pine wood',
  'cast iron','wrought iron','steel frame','steel body','stainless steel','galvanized steel',
  'forged','billet','carbon steel','alloy steel',
  'marble','granite','concrete','stone top',
  'heavy duty','heavy-duty','commercial grade','commercial-grade',
  'industrial grade','industrial-grade','reinforced'
];
// 超大尺寸词（减分）
const TITLE_BIG_SIZE = [
  'king size','king-size','king bed','california king',
  'queen size','queen-size','queen bed',
  'full size','full-size','oversized','extra large','xl size',
  '72 inch','72"','84 inch','84"','96 inch','96"','108 inch',
  'sectional','l-shape','u-shape',

  'fat tire','cargo',
  'riding mower','zero turn','walk behind',
  'full suspension','dual suspension'
];
// 危险词（加分）：暗示小件/零件/附件
const TITLE_DANGER = [
  'replacement part','replace part','oem replacement',
  'bracket','mount bracket','mounting bracket',
  'clip','retainer clip','spring clip',
  'cover only','cover plate','trim cover',
  'gasket','o-ring','seal kit','seal only',
  'spacer','shim','bushing',
  'adapter','converter','coupler',
  'connector','fitting','junction',
  'handle only','knob only','switch only',
  'bolt kit','nut kit','hardware kit',
  'repair kit','rebuild kit','service kit',
  'travel size','handheld','pocket'
];
// 门槛边界重量：奖励档位下限 10/50/70/150 磅
const TIER_BOUNDARIES = [10, 50, 70, 150];

function scoreTitleModule(title) {
  if (!title || title.trim().length === 0) {
    return { score: 0, reasons: '未填写标题，跳过（不影响评分）' };
  }
  const t = title.toLowerCase();
  let score = 0; // 中性基准，无信号=0分
  let reasons = [];

  // ① 危险词（加分，最高+50）
  const foundDanger = TITLE_DANGER.filter(w => t.includes(w));
  if (foundDanger.length > 0) {
    const add = Math.min(foundDanger.length * 18, 50);
    score += add;
    reasons.push('⚠ 含小件/零件词: ' + foundDanger.slice(0,3).join(', '));
  }

  // ② 大尺寸词（减分，最高-35）
  const foundSize = TITLE_BIG_SIZE.filter(w => t.includes(w));
  if (foundSize.length > 0) {
    const sub = Math.min(foundSize.length * 12, 35);
    score -= sub;
    reasons.push('✓ 含大尺寸词: ' + foundSize.slice(0,2).join(', '));
  }

  // ③ 重材质词（减分，最高-25）
  const foundMat = TITLE_HEAVY_MATERIAL.filter(w => t.includes(w));
  if (foundMat.length > 0) {
    const sub = Math.min(foundMat.length * 10, 25);
    score -= sub;
    reasons.push('✓ 含重材质词: ' + foundMat.slice(0,2).join(', '));
  }

  // ④ 门槛边界重量数字检测（加分+25）
  // 匹配标题中出现的重量数值，如 "70 lbs" "150lb" "70 pounds" "70-pound"
  const weightMatches = [...t.matchAll(/\b(\d+\.?\d*)\s*(?:lbs?|pounds?|lb\.?)\b/g)];
  let cliffWord = null;
  for (const m of weightMatches) {
    const num = parseFloat(m[1]);
    for (const boundary of TIER_BOUNDARIES) {
      if (num >= boundary && num <= boundary + 5) {
        cliffWord = m[0].trim();
        break;
      }
    }
    if (cliffWord) break;
  }
  if (cliffWord) {
    score += 25;
    reasons.push('⚠ 标题含门槛边界重量 "' + cliffWord + '"（疑似卡档）');
  }

  score = Math.max(0, Math.min(100, score));
  return { score, reasons: reasons.join(' | ') || '标题中性，无明显信号' };
}

// ─── MODULE 3: PRICE INTELLIGENCE ─────────────────────────────────────────
function scorePriceModule(price, weight, catData) {
  if (!price) return { score: 0, reasons: '未填写价格，跳过（不影响评分）' };
  if (!weight || weight === 0) return { score: 0, reasons: '未填写重量，跳过（不影响评分）' };

  const ppl = price / weight;
  const { pricePerLbMin, pricePerLbMax } = catData;
  let score = 0;
  let reasons = '';

  if (ppl < pricePerLbMin * 0.4) {
    score = 90;
    reasons = `极度价格倒挂：$${ppl.toFixed(1)}/磅，远低于该品类正常区间 $${pricePerLbMin}-$${pricePerLbMax}/磅`;
  } else if (ppl < pricePerLbMin * 0.7) {
    score = 70;
    reasons = `价格偏低：$${ppl.toFixed(1)}/磅，低于该品类正常区间 $${pricePerLbMin}-$${pricePerLbMax}/磅`;
  } else if (ppl <= pricePerLbMax * 1.5) {
    score = 15;
    reasons = `价格合理：$${ppl.toFixed(1)}/磅，在该品类正常区间内`;
  } else {
    score = 20;
    reasons = `价格偏高但不异常：$${ppl.toFixed(1)}/磅（高价产品）`;
  }

  // 动态检测：价格是否恰好在当前层级的最大补贴点附近
  // 各档最大补贴触发价：20%→$600, 40%→$300, 60%→$200, 80%→$150
  const { tier: currentTier } = getTier(weight);
  if (currentTier && price > 0) {
    const maxRewardPrice = 120 / currentTier.pctNum;
    const deviation = Math.abs(price - maxRewardPrice) / maxRewardPrice;
    if (deviation < 0.12) {
      score = Math.min(score + 25, 100);
      reasons += ` | ⚠ 价格$${price}恰好在${currentTier.pct}档最大补贴点($${maxRewardPrice.toFixed(0)})附近（Gaming信号）`;
    }
  }

  return { score, reasons };
}

// ─── MODULE 1: CATEGORY BASELINE ──────────────────────────────────────────
function scoreCategoryModule(weight, catData) {
  if (!weight) return { score: 50, reasons: '未填写重量' };

  const { p95, risk } = catData;
  const riskLabel = { green:'🟢 绿色品类（天然符合）', yellow:'🟡 黄色品类（需信号验证）', red:'🔴 红色品类（高欺诈风险）' };
  let score = 0;
  let reasons = '';

  const overRate = (weight - p95) / p95;
  const baseScore = risk === 'green' ? 0 : risk === 'yellow' ? 15 : 25;

  if (weight <= p95) {
    score = baseScore;
    const baseLabel = baseScore > 0 ? `（含品类基础风险${baseScore}分）` : '';
    reasons = `申报重量 ${weight}磅 在品类正常范围内（P95=${p95}磅）${baseLabel}`;
  } else if (overRate < 0.50) {
    score = Math.min(100, baseScore + 30);
    reasons = `申报重量 ${weight}磅 超出P95（${p95}磅）${(overRate*100).toFixed(0)}%，偏高`;
  } else {
    score = Math.min(100, baseScore + 60);
    reasons = `申报重量 ${weight}磅 超出P95（${p95}磅）${(overRate*100).toFixed(0)}%，严重异常`;
  }

  if (risk === 'red' && weight <= p95) {
    reasons += ' | 🔴 红色品类：天然不应达到大重货门槛';
  }

  reasons = riskLabel[risk] + ' | ' + reasons;
  return { score, reasons };
}

// ─── MODULE 4: WEIGHT DISTRIBUTION ────────────────────────────────────────
function scoreWeightModule(weight, catData) {
  if (!weight || !catData) return { score: 50, reasons: '未填写重量或品类' };

  const { p50 } = catData;
  const deviation = (weight - p50) / p50;
  let score, reasons;

  if (deviation < 0) {
    score = 0;
    reasons = `申报重量 ${weight}磅 低于品类中位数 ${p50}磅，无虚高风险`;
  } else if (deviation < 0.20) {
    score = 0;
    reasons = `申报重量 ${weight}磅 接近品类中位数 ${p50}磅（偏差 ${(deviation*100).toFixed(0)}%），正常`;
  } else if (deviation < 0.50) {
    score = 40;
    reasons = `申报重量 ${weight}磅 偏离品类中位数 ${p50}磅 ${(deviation*100).toFixed(0)}%，偏高`;
  } else if (deviation < 1.00) {
    score = 70;
    reasons = `申报重量 ${weight}磅 偏离品类中位数 ${p50}磅 ${(deviation*100).toFixed(0)}%，显著异常`;
  } else {
    score = 90;
    reasons = `申报重量 ${weight}磅 是品类中位数 ${p50}磅 的 ${(deviation+1).toFixed(1)} 倍，极度异常`;
  }

  return { score, reasons };
}

// ─── DIMENSION CHECK ───────────────────────────────────────────────────────
function checkDimensions(d1, d2, d3) {
  if (!d1 || !d2 || !d3) return { pass: null, msg: '未填写完整三边尺寸，跳过检测（不影响评分）', failedRules: [], passedRules: [] };

  const dims = [d1, d2, d3].map(Number).sort((a,b) => b - a);
  const [longest, second, shortest] = dims;
  const girth = 2 * (second + shortest);

  const rule1 = longest > 59;
  const rule2 = second > 33;
  const rule3 = shortest > 33;
  const rule4 = longest + girth > 130;

  const pass = rule1 || rule2 || rule3 || rule4;

  const passedRules = [], failedRules = [];
  rule1 ? passedRules.push(`最长边 ${longest}" > 59" ✓`) : failedRules.push(`最长边 ${longest}" ≤ 59"（需 > 59"）`);
  rule2 ? passedRules.push(`次长边 ${second}" > 33" ✓`) : failedRules.push(`次长边 ${second}" ≤ 33"（需 > 33"）`);
  rule3 ? passedRules.push(`最短边 ${shortest}" > 33" ✓`) : failedRules.push(`最短边 ${shortest}" ≤ 33"（需 > 33"）`);
  rule4 ? passedRules.push(`长度+围长 ${longest+girth}" > 130" ✓`) : failedRules.push(`长度+围长 ${longest+girth}" ≤ 130"（需 > 130"）`);

  const msg = pass ? passedRules.join(' | ') : '四项条件均未满足（满足任一即可）';
  return { pass, msg, passedRules, failedRules };
}

// ─── DENSITY CHECK ─────────────────────────────────────────────────────────
// 密度 = 重量(磅) / 体积(立方英尺)  1 ft³ = 1728 in³
const DENSITY_THRESHOLD = {
  auto:       200,
  industrial: 150,
  home:        80,
  sport:       60,
  fashion:     50,
};

// 材质密度参考范围 (lbs/ft³)
// min: 该材质产品的合理密度下限（考虑空腔/结构）
// max: 物理上绝对不可能超过的上限（实心原材料密度）
const MATERIAL_DENSITY = {
  cast_iron:      { label:'铸铁/实心钢', min:30,  max:490, ref:490 },
  steel_frame:    { label:'钢架/钣金',   min:3,   max:120, ref:490 },
  aluminum:       { label:'铝合金',      min:3,   max:100, ref:168 },
  copper:         { label:'铜',          min:10,  max:300, ref:556 },
  solid_hardwood: { label:'实木(硬木)',  min:15,  max:60,  ref:50  },
  solid_softwood: { label:'实木(软木)',  min:10,  max:40,  ref:31  },
  wood_frame:     { label:'木框架/合板', min:1,   max:30,  ref:31  },
  marble:         { label:'大理石/花岗岩',min:20, max:180, ref:170 },
  concrete:       { label:'混凝土',      min:10,  max:150, ref:150 },
  plastic:        { label:'塑料/ABS',    min:0.5, max:12,  ref:7   },
  glass:          { label:'玻璃',        min:5,   max:165, ref:160 },
  foam:           { label:'泡沫/海绵',   min:0.2, max:5,   ref:2   },
  fabric:         { label:'布料/纺织品', min:0.3, max:10,  ref:5   },
};

function checkDensity(weight, d1, d2, d3, industry, materialKey) {
  if (!d1 || !d2 || !d3 || !weight) return { score: 0, msg: null, lines: [] };

  const volFt3 = (d1 * d2 * d3) / 1728;
  const density = weight / volFt3;
  const lines = [];
  let score = 0;

  // ① 品类上限检测
  const limit = DENSITY_THRESHOLD[industry] || 100;
  let catLevel = '正常', catColor = '#34a853';
  if (density > limit * 2) {
    score += 40; catLevel = '极度异常'; catColor = '#c62828';
  } else if (density > limit) {
    score += 20; catLevel = '偏高'; catColor = '#fbbc04';
  }
  lines.push({
    color: catColor,
    text: `⬡ 品类密度：${density.toFixed(1)} 磅/ft³，品类上限 ${limit} 磅/ft³ — ${catLevel}`
      + (score > 0 ? `（+${Math.min(score,40)}分）` : '')
  });

  // ② 材质交叉验证（仅当选了材质时）
  if (materialKey && MATERIAL_DENSITY[materialKey]) {
    const mat = MATERIAL_DENSITY[materialKey];
    let matScore = 0, matLevel = '', matColor = '#34a853';

    if (density > mat.ref) {
      // 超过该材质实心原材料的密度 → 物理不可能
      matScore = 50; matLevel = `❌ 物理不可能！${mat.label}实心密度上限仅 ${mat.ref} 磅/ft³`; matColor = '#c62828';
    } else if (density > mat.max) {
      // 超过成品合理上限
      matScore = 30; matLevel = `⚠ 超出${mat.label}成品合理范围（上限 ${mat.max} 磅/ft³）`; matColor = '#ea4335';
    } else if (density < mat.min && density > 0.1) {
      // 低于合理下限（尺寸可能虚大，但不加分，仅提示）
      matLevel = `ℹ 低于${mat.label}典型密度（下限 ${mat.min} 磅/ft³），尺寸偏大或结构较空`; matColor = '#888';
    } else {
      matLevel = `✓ 与${mat.label}材质密度吻合（${mat.min}–${mat.max} 磅/ft³）`;
    }

    score = Math.min(score + matScore, 60);
    lines.push({
      color: matColor,
      text: `⬡ 材质验证（${mat.label}）：${matLevel}` + (matScore > 0 ? `（+${matScore}分）` : '')
    });
  }

  return { score, density: density.toFixed(1), lines };
}

// ─── REWARD TIER ──────────────────────────────────────────────────────────
const TIERS = [
  { name:'超大件-轻型', range:'10–50 磅', pct:'20%', pctNum:0.20, min:10,  max:50  },
  { name:'超大件-中型', range:'50–70 磅', pct:'40%', pctNum:0.40, min:50,  max:70  },
  { name:'超大件-重型', range:'70–150 磅',pct:'60%', pctNum:0.60, min:70,  max:150 },
  { name:'超大件-超重型',range:'>150 磅', pct:'80%', pctNum:0.80, min:150, max:Infinity },
];

// Returns {tier, isCliff, cliffDist}
function getTier(weight) {
  let tier = null;
  for (const t of TIERS) {
    if (weight > t.min && weight <= (t.max === Infinity ? Infinity : t.max)) {
      tier = t; break;
    }
  }
  if (!tier) return { tier: null, isCliff: false, cliffDist: null };

  // Check cliff: within 3 lbs above the tier's lower boundary
  const cliffDist = weight - tier.min;
  const isCliff = cliffDist >= 0 && cliffDist <= 3;
  return { tier, isCliff, cliffDist };
}

function renderTierBox(weight, price) {
  if (!weight) {
    document.getElementById('tier-box').innerHTML = '<span style="color:#aaa;font-size:13px">请填写申报重量</span>';
    document.getElementById('cliff-alert').innerHTML = '';
    return { cliffBonus: 0 };
  }

  const { tier, isCliff, cliffDist } = getTier(weight);
  let html = '';
  TIERS.forEach(t => {
    const isActive = tier && t.name === tier.name;
    const estimatedReward = price ? Math.min(price * t.pctNum, 120).toFixed(0) : '—';
    html += `
      <div class="tier-item ${isActive ? 'active' : ''} ${isActive && isCliff ? 'cliff' : ''}">
        <div class="tier-range">${t.range}</div>
        <div class="tier-name">${t.name}</div>
        <div class="tier-pct">${t.pct}</div>
        <div class="tier-reward">奖励≈ $${estimatedReward}</div>
      </div>`;
  });
  document.getElementById('tier-box').innerHTML = html;

  let cliffBonus = 0;
  if (isCliff && tier) {
    cliffBonus = tier.min === 10 ? 15 : 35;
    document.getElementById('cliff-alert').innerHTML = `
      <div class="cliff-alert">
        ⚠ <strong>门槛堆积信号：</strong>
        申报重量 <strong>${weight}磅</strong> 刚过 <strong>${tier.name}</strong> 下限 ${tier.min}磅，
        仅超出 <strong>${cliffDist}磅</strong>。${tier.min === 10 ? '刚刚进入促销资格门槛。' : '这是最典型的Gaming模式（刻意填到刚好过门槛）。'}
        风险分额外加 +${cliffBonus}。
      </div>`;
  } else {
    document.getElementById('cliff-alert').innerHTML = '';
  }
  return { cliffBonus };
}

// ─── BAR COLOR ─────────────────────────────────────────────────────────────
function barColor(score) {
  if (score < 30) return '#34a853';
  if (score < 60) return '#fbbc04';
  if (score < 80) return '#ea4335';
  return '#c62828';
}

// ─── MAIN ANALYZE ──────────────────────────────────────────────────────────
function analyze() {
  const catKey  = document.getElementById('category').value;
  const title   = document.getElementById('title').value;
  const price   = parseFloat(document.getElementById('price').value) || 0;
  const weight  = parseFloat(document.getElementById('weight').value) || 0;
  const d1      = parseFloat(document.getElementById('dim1').value) || 0;
  const d2      = parseFloat(document.getElementById('dim2').value) || 0;
  const d3      = parseFloat(document.getElementById('dim3').value) || 0;

  if (!catKey) { alert('请先选择品类'); return; }
  if (!weight)  { alert('请填写申报重量'); return; }

  const lookupKey = CAT_ID_MAP[catKey] || catKey;
  const catData = CATEGORIES[lookupKey];

  // Run modules
  const m1 = scoreCategoryModule(weight, catData);
  const m2 = scoreTitleModule(title);
  const m3 = scorePriceModule(price, weight, catData);
  const m4 = scoreWeightModule(weight, catData);
  const m5 = scoreSellerModule();
  const dimCheck = checkDimensions(d1, d2, d3);
  const materialKey = document.getElementById('material').value;
  const densityCheck = checkDensity(weight, d1, d2, d3, catData.industry, materialKey);

  // Tier box + cliff detection (renders UI, returns cliff bonus)
  const { cliffBonus } = renderTierBox(weight, price);

  // Weighted total: M1-M4 weighted, M5 & cliff added directly
  // 尺寸-重量矛盾加分：尺寸不达标但申报重量>50磅，强矛盾信号
  const sizeContradictionBonus = (dimCheck.pass === false && weight > 50) ? 30 : 0;

  const total = Math.min(100, Math.round(
    m1.score * 0.25 +
    m2.score * 0.35 +
    m3.score * 0.25 +
    m4.score * 0.15 +
    Math.min(m5.score, 60) +
    cliffBonus +
    sizeContradictionBonus +
    densityCheck.score
  ));

  // Determine verdict
  let level, label, action;
  if (total < 20) {
    level = 'low';    label = '✅ 低风险 — AUTO PASS';       action = '自动通过，正常计入奖励';
  } else if (total < 60) {
    level = 'medium'; label = '🟡 中风险 — SAMPLE CHECK';    action = '抽检5%人工审核，其余通过';
  } else if (total < 80) {
    level = 'high';   label = '🔴 高风险 — MANUAL REVIEW';   action = '100%人工审核，审核通过后计入奖励';
  } else {
    level = 'block';  label = '🚫 极高风险 — BLOCK';         action = '拦截，不计入奖励；触发申诉流程';
  }

  // Render results
  document.getElementById('form-card').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  // ── 资格检测 Banner ──────────────────────────────────────────────
  const eligBanner = document.getElementById('eligibility-banner');
  if (dimCheck.pass === false) {
    eligBanner.innerHTML = `
      <div style="background:#fde8e8;border:2px solid #c62828;border-radius:10px;padding:16px 20px;margin-bottom:16px;">
        <div style="font-size:15px;font-weight:700;color:#c62828;margin-bottom:10px;">
          ❌ 不符合大重货尺寸门槛 — 该刊登无资格参与此次促销
        </div>
        <div style="font-size:13px;color:#777;margin-bottom:8px;">以下四项条件均未满足（满足任一即可）：</div>
        ${dimCheck.failedRules.map(r => `<div style="font-size:13px;color:#c62828;margin:4px 0 4px 12px;">✗ ${r}</div>`).join('')}
        <div style="font-size:12px;color:#999;margin-top:10px;border-top:1px solid #f5c6c6;padding-top:8px;">
          以下欺诈风险评分仅供参考，本刊登因尺寸不达标已无法获得补贴。
        </div>
      </div>`;
  } else if (dimCheck.pass === true) {
    eligBanner.innerHTML = `
      <div style="background:#e8f5e9;border:2px solid #2e7d32;border-radius:10px;padding:12px 20px;margin-bottom:16px;">
        <div style="font-size:14px;font-weight:700;color:#2e7d32;">✅ 符合大重货尺寸门槛</div>
        <div style="font-size:12px;color:#555;margin-top:4px;">${dimCheck.passedRules.join(' | ')}</div>
      </div>`;
  } else {
    eligBanner.innerHTML = `
      <div style="background:#f5f5f5;border:1px solid #ddd;border-radius:10px;padding:12px 20px;margin-bottom:16px;">
        <div style="font-size:13px;color:#999;">ℹ 未填写三边尺寸，跳过资格检测（尺寸是参与促销的前置条件）</div>
      </div>`;
  }

  const rh = document.getElementById('result-header');
  rh.className = 'result-header ' + level;
  document.getElementById('score-display').textContent = total;
  document.getElementById('score-display').style.color =
    level === 'low' ? '#2e7d32' : level === 'medium' ? '#f57f17' : '#c62828';
  document.getElementById('result-label').textContent = label;
  document.getElementById('result-action').textContent = '建议处置：' + action;

  // Dimension check — show each rule's pass/fail status
  const sr = document.getElementById('size-result');
  if (dimCheck.pass === null) {
    sr.className = 'size-check';
    sr.style.cssText = 'background:#f5f5f5;color:#888;';
    sr.textContent = 'ℹ 未填写完整三边尺寸，跳过检测';
  } else {
    const allRules = [
      ...dimCheck.passedRules.map(r => `<span style="color:#2e7d32">✓ ${r}</span>`),
      ...dimCheck.failedRules.map(r => `<span style="color:#c62828">✗ ${r}</span>`)
    ];
    sr.className = 'size-check ' + (dimCheck.pass ? 'pass' : 'fail');
    sr.style.cssText = '';
    sr.innerHTML = (dimCheck.pass ? '✅ 尺寸达标' : '❌ 尺寸不达标') + '<br>'
      + '<div style="font-size:12px;margin-top:6px;line-height:1.8">' + allRules.join('<br>') + '</div>';
  }

  // Density result
  const dr = document.getElementById('density-result');
  if (densityCheck.lines && densityCheck.lines.length > 0) {
    dr.innerHTML = densityCheck.lines
      .map(l => `<div style="color:${l.color};margin-top:6px;font-size:13px">${l.text}</div>`)
      .join('');
  } else {
    dr.innerHTML = '<div style="color:#aaa;margin-top:6px;font-size:13px">⬡ 密度检测：未填写三边尺寸，跳过</div>';
  }

  // Module cards
  const modules = [
    { name:'Module 1 · 品类基准线',  weight:'25%', score: m1.score, reason: m1.reasons },
    { name:'Module 2 · 标题关键词',  weight:'35%', score: m2.score, reason: m2.reasons },
    { name:'Module 3 · 价格合理性',  weight:'25%', score: m3.score, reason: m3.reasons },
    { name:'Module 4 · 重量分布偏差',weight:'15%', score: m4.score, reason: m4.reasons },
  ];

  const weightedCards = modules.map(m => `
    <div class="module-card">
      <div class="mod-name">${m.name} <span style="color:#aaa">(权重${m.weight})</span></div>
      <div class="mod-score" style="color:${barColor(m.score)}">${m.score}</div>
      <div class="bar"><div class="bar-fill" style="width:${m.score}%;background:${barColor(m.score)}"></div></div>
      <div class="mod-reason">${m.reason}</div>
    </div>
  `).join('');

  const m5Actual = Math.min(m5.score, 60);
  const m5Color = m5.score === 0 ? '#34a853' : m5.score <= 40 ? '#fbbc04' : '#ea4335';
  const m5Cap = m5.score > 60 ? `（上限60，实际加+${m5Actual}）` : '';
  const m5Card = `
    <div class="module-card">
      <div class="mod-name">Module 5 · 卖家行为 <span style="color:#aaa">(直接加分，上限60)</span></div>
      <div class="mod-score" style="color:${m5Color}">${m5.score > 0 ? '+' : ''}${m5.score}${m5Cap}</div>
      <div class="mod-reason">${m5.reasons}</div>
    </div>`;

  document.getElementById('module-scores').innerHTML = weightedCards + m5Card;
}

function reset() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('form-card').style.display = 'block';
  ['beh1','beh2','beh3','beh4','beh5'].forEach(id => {
    document.getElementById(id).checked = false;
  });
  document.getElementById('material').value = '';
}
</script>
